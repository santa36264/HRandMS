# Nginx Configuration for SATAAB Hotel Telegram Bot
# Location: /etc/nginx/sites-available/sataab-hotel

# HTTP to HTTPS Redirect
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;
    
    # Redirect all HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS Server Block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ========================================
    # SSL Configuration
    # ========================================
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/yourdomain.com/chain.pem;

    # SSL Protocols and Ciphers
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!3DES;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ========================================
    # Security Headers
    # ========================================
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ========================================
    # Logging
    # ========================================
    access_log /var/log/nginx/sataab-hotel-access.log combined buffer=32k flush=5s;
    error_log /var/log/nginx/sataab-hotel-error.log warn;

    # ========================================
    # Root and Index
    # ========================================
    root /var/www/sataab-hotel/backend/public;
    index index.php index.html index.htm;

    # ========================================
    # Gzip Compression
    # ========================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/json application/javascript 
               application/x-font-ttf application/x-font-opentype 
               application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";

    # ========================================
    # Rate Limiting Zones
    # ========================================
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;

    # ========================================
    # PHP-FPM Configuration
    # ========================================
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Timeouts
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 60s;
        fastcgi_read_timeout 60s;
        
        # Buffers
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        
        # Security
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_SCHEME https;
    }

    # ========================================
    # Telegram Webhook Endpoint
    # ========================================
    location /api/telegram-webhook {
        limit_req zone=webhook_limit burst=20 nodelay;
        try_files $uri /index.php?$query_string;
        
        # Allow POST only
        limit_except POST {
            deny all;
        }
    }

    # ========================================
    # API Endpoints
    # ========================================
    location /api/ {
        limit_req zone=api_limit burst=10 nodelay;
        try_files $uri /index.php?$query_string;
    }

    # ========================================
    # Laravel Routes
    # ========================================
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ========================================
    # Deny Access to Sensitive Files
    # ========================================
    location ~ /\.env {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /\.git {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /\.htaccess {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /composer\.(json|lock) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /package\.(json|lock) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ========================================
    # Static Files Caching
    # ========================================
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ========================================
    # Favicon and Robots
    # ========================================
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # ========================================
    # Health Check Endpoint
    # ========================================
    location /health {
        access_log off;
        try_files $uri /index.php?$query_string;
    }

    # ========================================
    # Deny Access to Directories
    # ========================================
    location ~ ^/(storage|bootstrap|config)/ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ========================================
    # Client Upload Limits
    # ========================================
    client_max_body_size 100M;
    client_body_timeout 60s;
    client_header_timeout 60s;
    keepalive_timeout 65s;

    # ========================================
    # Performance Tuning
    # ========================================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    types_hash_max_size 2048;
    server_tokens off;
}
